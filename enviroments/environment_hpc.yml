# =============================================================================
# Entorno Conda: ids-iot-train  (Servidor HPC - Windows)
# Proyecto: Módulo de Detección para IDS Pasivo
#
# Propósito : Entrenamiento completo del modelo TCN con aceleración GPU nativa.
# Hardware  : GPU NVIDIA en Servidor Windows. 
#             Requiere CUDA Toolkit 11.2 y cuDNN 8.1 instalados en el host.
# Python    : 3.10.x
#
# Decisión de versiones:
#   - Python 3.10: Máxima estabilidad con TensorFlow 2.10 en Windows.
#   - TF 2.10: Última versión con soporte nativo de GPU en Windows (sin WSL).
# =============================================================================

name: ids-iot-train

channels:
  - conda-forge
  - defaults

dependencies:
  # ── Core ────────────────────────────────────────────────────────────────────
  - python=3.10
  - pip

  # ── Entorno Jupyter ─────────────────────────────────────────────────────────
  - ipykernel
  - jupyterlab>=4.0

  # ── Manipulación de datos ───────────────────────────────────────────────────
  - numpy>=1.21.5,<1.24.0 # Limitado para evitar conflictos de binarios con TF 2.10
  - pandas>=2.0.3
  - pyarrow>=12.0.0
  - tqdm

  # ── ML clásico ──────────────────────────────────────────────────────────────
  - scikit-learn>=1.3.0
  - joblib>=1.3.0

  # ── Feature Importance y Explicabilidad (SHAP/XGBoost) ──────────────────────
  - xgboost>=2.0.0
  - shap>=0.43.0

  # ── Visualización ───────────────────────────────────────────────────────────
  - matplotlib>=3.7.0
  - seaborn>=0.12.0

  # ── Instalados vía pip ──────────────────────────────────────────────────────
  - pip:
    # TF 2.10 con soporte GPU nativo para Windows.
    - tensorflow==2.10.0

    # Capa TCN 
    - keras-tcn==3.5.0

    # QKeras: Quantization-Aware Training (QAT)
    - qkeras==0.9.0

    # Rebalanceo de clases
    - imbalanced-learn==0.11.0

    # Descarga del dataset
    - kagglehub

    # Herramientas de desarrollo
    - black
    - isort
    
    # Utilidad para monitoreo de uso de la GPU durante el entrenamiento
    - gputil

    # Generación de datos sintéticos para balanceo avanzado 
    - ctgan