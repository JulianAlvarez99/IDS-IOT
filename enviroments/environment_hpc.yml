# =============================================================================
# Entorno Conda: ids-iot-train  (Servidor HPC - Linux)
# Proyecto: Módulo de Detección para IDS Pasivo
#
# Propósito : Entrenamiento completo del modelo TCN con aceleración GPU.
#             También utilizable para compresión (Hito 4).
# Hardware  : GPU NVIDIA — requiere CUDA 11.8 y cuDNN 8.6 instalados en el host.
# Python    : 3.11.x
#
# Decisión de versiones:
#   - Python 3.11: sincronizado con entorno local Windows (ids-iot-dev).
#   - TF 2.14: última versión con Keras v2 integrado, requerido por hls4ml.
#              TF 2.14 es compatible con CUDA 11.8 / cuDNN 8.6.
#
# Prerequisitos en el servidor:
#   - CUDA Toolkit 11.8:  https://developer.nvidia.com/cuda-11-8-0-download-archive
#   - cuDNN 8.6:          https://developer.nvidia.com/rdp/cudnn-archive
#   - Verificar con:      nvidia-smi  &&  nvcc --version
#
# IMPORTANTE: Mantener Python y TensorFlow sincronizados con environment.yml.
# =============================================================================

name: ids-iot-train

channels:
  - conda-forge
  - defaults

dependencies:
  # ── Core ────────────────────────────────────────────────────────────────────
  - python=3.11
  - pip

  # ── Entorno Jupyter ──────────────────────────────────────────────────────────
  - ipykernel
  - jupyterlab>=4.0

  # ── Manipulación de datos ────────────────────────────────────────────────────
  - numpy>=1.23.5,<2.0.0
  - pandas>=2.0.3
  - pyarrow>=12.0.0
  - tqdm

  # ── ML clásico ───────────────────────────────────────────────────────────────
  - scikit-learn>=1.3.0
  - joblib>=1.3.0

  # ── Feature Importance y Explicabilidad (SHAP/XGBoost) ──
  - xgboost>=2.0.0
  - shap>=0.43.0

  # ── Visualización ────────────────────────────────────────────────────────────
  - matplotlib>=3.7.0
  - seaborn>=0.12.0

  # ── Instalados vía pip ───────────────────────────────────────────────────────
  - pip:
    # TF 2.14 con soporte GPU para Linux.
    # Compatible con CUDA 11.8 y cuDNN 8.6.
    # Misma versión que el entorno local para garantizar compatibilidad
    # de artefactos (.keras, .joblib) entre ambos entornos.
    - tensorflow==2.14.0

    # Capa TCN — misma versión que el entorno local
    - keras-tcn==3.5.0

    # QKeras — misma versión que el entorno local
    - qkeras==0.9.0

    # Rebalanceo de clases
    - imbalanced-learn==0.11.0

    # Descarga del dataset
    - kagglehub

    # Herramientas de desarrollo
    - black
    - isort
