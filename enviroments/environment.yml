# =============================================================================
# Entorno Conda: ids-iot-dev  (Local - Windows)
# Proyecto: Módulo de Detección para IDS Pasivo
#
# Propósito : Edición de código, análisis exploratorio (EDA), prototipado
#             liviano y validación de pipelines sin entrenamiento.
# Hardware  : CPU-only. El entrenamiento con GPU se ejecuta en Linux HPC.
# Python    : 3.11.x
#
# Decisión de versiones:
#   - Python 3.11: óptimo en estabilidad para el stack TF + QKeras + keras-tcn.
#   - TF 2.14: última versión con Keras v2 integrado, requerido por el
#              conversor hls4ml (Hito 5). TF 2.15+ separa Keras en paquete
#              independiente (v3) e incompatibiliza con hls4ml keras_to_hls.
#
# IMPORTANTE: Mantener Python y TensorFlow sincronizados con environment_hpc.yml.
# =============================================================================

name: ids-iot-dev

channels:
  - conda-forge
  - defaults

dependencies:
  # ── Core ────────────────────────────────────────────────────────────────────
  - python=3.11
  - pip

  # ── Entorno Jupyter ──────────────────────────────────────────────────────────
  - ipykernel          # Kernel para Jupyter/VS Code
  - jupyterlab>=4.0

  # ── Manipulación de datos ────────────────────────────────────────────────────
  # numpy: <2.0 por compatibilidad binaria con TF 2.14
  - numpy>=1.23.5,<2.0.0
  - pandas>=2.0.3
  - pyarrow>=12.0.0    # Lectura/escritura de .feather (formato binario rápido)
  - tqdm               # Barras de progreso

  # ── ML clásico ───────────────────────────────────────────────────────────────
  - scikit-learn>=1.3.0
  - joblib>=1.3.0      # Serialización de artefactos (scaler, label encoder)

  # ── Feature Importance y Explicabilidad (SHAP/XGBoost) ──
  - xgboost>=2.0.0
  - shap>=0.43.0

  # ── Visualización ────────────────────────────────────────────────────────────
  - matplotlib>=3.7.0
  - seaborn>=0.12.0

  # ── Herramientas de desarrollo ───────────────────────────────────────────────
  - black              # Formateador PEP 8
  - isort              # Ordenador de imports
  - mypy               # Verificador de tipos estáticos

  # ── Instalados vía pip ───────────────────────────────────────────────────────
  - pip:
    # TF 2.14 CPU: última versión con Keras v2 integrado.
    # Requerido para compatibilidad con el conversor keras_to_hls de hls4ml
    # (Hito 5). Versiones >=2.15 separan Keras como paquete independiente (v3)
    # e incompatibizan con el conversor maduro de hls4ml.
    - tensorflow-cpu==2.14.0

    # Capa TCN para Keras Sequential/Functional API
    - keras-tcn==3.5.0

    # QKeras: Quantization-Aware Training (QAT) — Hito 4
    - qkeras==0.9.0

    # Rebalanceo de clases (SMOTE y variantes) — Hito 3
    - imbalanced-learn==0.11.0

    # Descarga del dataset CIC-IoT-2023 desde Kaggle con caché
    - kagglehub

    # Utilidad para monitoreo de GPU (aunque no se usará en este entorno CPU-only, es útil para scripts de entrenamiento en HPC)
    - gputil
