# =============================================================================
# Entorno Conda: ids-iot-dev  (Local - Windows 11)
# Proyecto: Módulo de Detección para IDS Pasivo
#
# Propósito : Edición de código, análisis exploratorio (EDA), prototipado
#             liviano y validación de pipelines. 
# Hardware  : Soporte nativo de GPU en Windows (requiere CUDA 11.2 y cuDNN 8.1).
# Python    : 3.10.x
#
# Decisión de versiones:
#   - Python 3.10: Requerido por máxima compatibilidad con TensorFlow 2.10.
#   - TF 2.10: Última versión con soporte nativo de GPU en Windows (sin WSL2).
#              Sigue integrando Keras v2, compatible con hls4ml.
# =============================================================================

name: ids-iot-dev

channels:
  - conda-forge
  - defaults

dependencies:
  # ── Core ────────────────────────────────────────────────────────────────────
  - python=3.10
  - pip

  # ── Entorno Jupyter ─────────────────────────────────────────────────────────
  - ipykernel          # Kernel para Jupyter/VS Code
  - jupyterlab>=4.0

  # ── Manipulación de datos ───────────────────────────────────────────────────
  - numpy>=1.21.5,<1.24.0 # Límite superior para evitar conflictos con TF 2.10
  - pandas>=2.0.3
  - pyarrow>=12.0.0    
  - tqdm               

  # ── ML clásico ──────────────────────────────────────────────────────────────
  - scikit-learn>=1.3.0
  - joblib>=1.3.0      

  # ── Feature Importance y Explicabilidad (SHAP/XGBoost) ──────────────────────
  - xgboost>=2.0.0
  - shap>=0.43.0

  # ── Visualización ───────────────────────────────────────────────────────────
  - matplotlib>=3.7.0
  - seaborn>=0.12.0

  # ── Herramientas de desarrollo ──────────────────────────────────────────────
  - black              
  - isort              
  - mypy               

  # ── Instalados vía pip ──────────────────────────────────────────────────────
  - pip:
    # TF 2.10: Última versión con soporte nativo de GPU en Windows.
    - tensorflow==2.10.0

    # Capa TCN para Keras Sequential/Functional API
    - keras-tcn==3.5.0

    # QKeras: Quantization-Aware Training (QAT)
    - qkeras==0.9.0

    # Rebalanceo de clases (SMOTE y variantes)
    - imbalanced-learn==0.11.0

    # Descarga del dataset CIC-IoT-2023 desde Kaggle
    - kagglehub

    # Utilidad para monitoreo de GPU
    - gputil